services:
  load_balancer:
    build:
      context: ./load_balancer
    container_name: load_balancer
    environment:
      AUTO_CREATE_CONTAINERS: "true"
      INITIAL_REPLICAS: "3"
      SERVER_IMAGE: "distributedloadbalancer-server:latest"
      SERVER_PORT: "5000"
      DOCKER_NETWORK: "distributedloadbalancer_default"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "5000:5000"
    depends_on:
      server1:
        condition: service_healthy
      server2:
        condition: service_healthy
      server3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/rep', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 8s
    networks:
      - distributedloadbalancer_default

  server1:
    build:
      context: ./server
    image: distributedloadbalancer-server:latest
    container_name: server1
    environment:
      SERVER_ID: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/heartbeat', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - distributedloadbalancer_default

  server2:
    build:
      context: ./server
    image: distributedloadbalancer-server:latest
    container_name: server2
    environment:
      SERVER_ID: "2"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/heartbeat', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - distributedloadbalancer_default

  server3:
    build:
      context: ./server
    image: distributedloadbalancer-server:latest
    container_name: server3
    environment:
      SERVER_ID: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/heartbeat', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - distributedloadbalancer_default

networks:
  distributedloadbalancer_default:
    name: distributedloadbalancer_default
